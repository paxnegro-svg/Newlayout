<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax Vault // HUD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        .bg-system-purple { background-color: #6B21A8; }
        .text-system-purple { color: #A855F7; }
        .border-twitch { border-color: #9146FF; }
        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(1000%); }
        }
        .animate-scanline { animation: scanline 6s linear infinite; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- COMPONENTS ---
        const GoalTracker = ({ current, goal }) => {
            const percentage = Math.min((current / goal) * 100, 100);
            return (
                <div className="relative w-64 p-3 bg-black/70 border border-white/10 backdrop-blur-md" style={{clipPath: 'polygon(0% 0%, 92% 0%, 100% 25%, 100% 100%, 8% 100%, 0% 75%)'}}>
                    <div className="flex justify-between items-end mb-2 px-1">
                        <div className="flex flex-col">
                            <span className="text-[9px] font-bold tracking-[0.2em] opacity-50 uppercase leading-none mb-1">DATA_LINK // SUB_GOAL</span>
                            <span className="text-xs font-bold tracking-widest text-system-purple">ESTABLISHING...</span>
                        </div>
                        <div className="text-lg font-bold tracking-tighter leading-none text-white">{current}<span className="opacity-30 mx-1">/</span>{goal}</div>
                    </div>
                    <div className="h-1.5 bg-white/5 relative overflow-hidden">
                        <div className="h-full bg-system-purple transition-all duration-500" style={{ width: `${percentage}%`, boxShadow: '0 0 10px #6B21A8' }} />
                    </div>
                </div>
            );
        };
const AlertBox = ({ alert }) => {
    return (
        <div className="relative flex items-center gap-4 p-4 pr-8 bg-black/80 border-l-4 border-system-purple shadow-[0_0_15px_rgba(107,33,168,0.5)] backdrop-blur-md mb-2"
             style={{ clipPath: 'polygon(0% 0%, 95% 0%, 100% 25%, 100% 100%, 5% 100%, 0% 75%)' }}>
            <div className="flex flex-col skew-x-[10deg]">
                <div className="text-[10px] font-bold tracking-widest opacity-50 uppercase">
                    [SYSTEM_ID]: {alert.platform}_SYNC // {alert.type}
                </div>
                <div className="text-xl font-bold tracking-tight uppercase text-white">
                    NEW_CONNECTION // {alert.username}
                </div>
            </div>
        </div>
    );
};
        const App = () => {
            const [subCount, setSubCount] = useState(150);
            const [viewerCount, setViewerCount] = useState(1240);
useEffect(() => {
    const handleStreamElementsEvent = (obj) => {
        const listener = obj.detail.listener;
        const event = obj.detail.event;

        if (listener === 'follower-latest') {
            // This triggers the alert when a new follower joins the Pax2K community
            setAlert({ username: event.name, type: 'Follower', platform: 'TWITCH' });
            setTimeout(() => setAlert(null), 5000); // Clear after 5 seconds
        }
    };

    window.addEventListener('onEventReceived', handleStreamElementsEvent);
    return () => window.removeEventListener('onEventReceived', handleStreamElementsEvent);
}, []);
            return (
                <div className="fixed inset-0 w-full h-full pointer-events-none p-12">
                    {/* Top Left: Goal & Viewers */}
                    <div className="flex flex-col gap-4 pointer-events-auto">
                        <GoalTracker current={subCount} goal={200} />
                        <div className="bg-black/70 border border-white/10 p-2 w-32 backdrop-blur-sm" style={{clipPath: 'polygon(0% 0%, 90% 0%, 100% 30%, 100% 100%, 10% 100%, 0% 70%)'}}>
                           <div className="text-[8px] opacity-50 uppercase mb-1">LIVE_FEED</div>
                           <div className="flex items-center gap-2 text-white text-sm font-bold">
                               <i data-lucide="users" className="w-3 h-3 text-system-purple"></i>
                               {viewerCount.toLocaleString()}
                           </div>
                        </div>
                    </div>

                    {/* Bottom HUD Decor */}
                    <div className="absolute bottom-8 left-8 flex items-center gap-4 opacity-40 skew-x-[-10deg]">
                        <div className="w-1 h-12 bg-system-purple" />
                        <div className="text-white">
                            <div className="text-[10px] font-bold tracking-widest">PAX_VAULT_V1.0.4</div>
                            <div className="text-xs uppercase">System_Stable // Online</div>
                        </div>
                    </div>

                    {/* Scanline Overlay */}
                    <div className="fixed inset-0 pointer-events-none opacity-[0.03] bg-[linear-gradient(rgba(18,16,16,0)_50%,rgba(0,0,0,0.25)_50%),linear-gradient(90deg,rgba(255,0,0,0.06),rgba(0,255,0,0.02),rgba(0,0,255,0.06))] z-50 bg-[length:100%_2px,3px_100%]" />
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        
        // Initialize Icons
        setTimeout(() => lucide.createIcons(), 100);
    </script>
</body>
</html>
