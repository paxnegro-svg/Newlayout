<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax2K // HUD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; }
        
        /* THEMES */
        .bg-system-purple { background-color: #6B21A8; }
        .text-system-purple { color: #A855F7; }
        .text-twitch { color: #9146FF; }
        .text-youtube { color: #FF0000; }
        .text-tiktok { color: #00f2ea; }
        .bg-chat-box { background-color: rgba(15, 23, 42, 0.4); }

        /* ANIMATIONS */
        @keyframes glitch-flash {
            0% { opacity: 0; transform: scale(1); }
            10% { opacity: 0.5; background: #6B21A8; }
            20% { opacity: 0; }
            30% { opacity: 0.3; background: #A855F7; }
            100% { opacity: 0; }
        }
        .animate-goal-met { animation: glitch-flash 1s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- COMPONENTS ---
        const GoalTracker = ({ current, goal, label, color, icon }) => {
            const percentage = Math.min((current / goal) * 100, 100);
            return (
                <div className="relative w-56 mb-2 p-2 bg-black/60 border-l-2 backdrop-blur-sm transition-all" 
                     style={{ borderColor: color, clipPath: 'polygon(0% 0%, 95% 0%, 100% 25%, 100% 100%, 5% 100%, 0% 75%)' }}>
                    <div className="flex justify-between items-center px-1">
                        <div className="flex items-center gap-2">
                            <i data-lucide={icon} className="w-3 h-3" style={{ color: color }}></i>
                            <span className="text-[8px] font-bold tracking-widest text-white uppercase opacity-70">{label}</span>
                        </div>
                        <div className="text-[10px] font-mono font-bold text-white">
                            {current}<span className="opacity-30 mx-0.5">/</span>{goal}
                        </div>
                    </div>
                    <div className="mt-1 h-1 bg-white/5 relative overflow-hidden">
                        <div className="h-full transition-all duration-1000" 
                             style={{ width: `${percentage}%`, backgroundColor: color, boxShadow: `0 0 8px ${color}` }} />
                    </div>
                </div>
            );
        };

        const AlertBox = ({ alert }) => (
            <div className="relative flex items-center gap-4 p-4 pr-8 bg-black/80 border-l-4 border-system-purple backdrop-blur-md mb-2 animate-bounce"
                 style={{ clipPath: 'polygon(0% 0%, 95% 0%, 100% 25%, 100% 100%, 5% 100%, 0% 75%)' }}>
                <div className="flex flex-col skew-x-[10deg]">
                    <div className="text-[10px] font-bold tracking-widest opacity-50 uppercase text-white">[SYSTEM_ID]: {alert.platform}</div>
                    <div className="text-xl font-bold tracking-tight uppercase text-white">NEW_CONNECTION // {alert.username}</div>
                </div>
            </div>
        );

        const ChatWidget = ({ messages }) => (
            <div className="relative w-80 h-64 flex flex-col gap-2 overflow-hidden">
                <div className="flex items-center gap-2 mb-1 px-2">
                    <i data-lucide="terminal" className="w-3 h-3 text-system-purple opacity-50"></i>
                    <span className="text-[9px] font-bold tracking-[0.2em] opacity-50 uppercase text-white">COMMS_LOG</span>
                </div>
                <div className="flex flex-col-reverse gap-2 overflow-y-auto pr-2 h-full">
                    {messages.map((msg) => (
                        <div key={msg.id} className="relative p-2 bg-chat-box border-l-2 border-white/10 backdrop-blur-sm"
                             style={{ clipPath: 'polygon(0% 0%, 100% 0%, 100% 80%, 95% 100%, 0% 100%)' }}>
                            <div className="flex flex-col gap-0.5">
                                <div className="flex items-center gap-2 text-[10px] font-bold">
                                    <span className={msg.platform === 'twitch' ? 'text-twitch' : msg.platform === 'youtube' ? 'text-youtube' : 'text-tiktok'}>{msg.username}</span>
                                    <span className="text-[8px] opacity-30 uppercase text-white">{msg.platform}</span>
                                </div>
                                <div className="text-[11px] text-white/80 font-mono">{msg.text}</div>
                            </div>
                        </div>
                    ))}
                </div>
            </div>
        );

        // --- MAIN APP ---
        const App = () => {
            const [ytSubs, setYtSubs] = useState(1840);
            const [ttFollows, setTtFollows] = useState(412);
            const [twFollows, setTwFollows] = useState(150);
            const [viewerCount, setViewerCount] = useState(1240);
            const [chatMessages, setChatMessages] = useState([]);
            const [currentAlert, setCurrentAlert] = useState(null);
            const [showGoalMet, setShowGoalMet] = useState(false);

            // Handle Incoming Events
            useEffect(() => {
                const handleEvents = (obj) => {
                    const listener = obj.detail.listener;
                    const event = obj.detail.event;
                    if (listener === 'message') {
                        const newMessage = { id: Math.random(), username: event.data.displayName || event.data.nick, text: event.data.text, platform: event.service || 'twitch' };
                        setChatMessages(prev => [newMessage, ...prev].slice(0, 10));
                    }
                    if (listener === 'follower-latest') {
                        setCurrentAlert({ username: event.name, type: 'Follower', platform: 'TWITCH' });
                        setTimeout(() => setCurrentAlert(null), 5000);
                    }
                };
                window.addEventListener('onEventReceived', handleEvents);
                return () => window.removeEventListener('onEventReceived', handleEvents);
            }, []);

            // Check for Goal Completion
            useEffect(() => {
                if (ytSubs >= 2500 || ttFollows >= 500 || twFollows >= 200) {
                    setShowGoalMet(true);
                    setTimeout(() => setShowGoalMet(false), 2000);
                }
            }, [ytSubs, ttFollows, twFollows]);

            const addTestMessage = (platform) => {
                const newMessage = { id: Math.random(), username: 'Pax_Fan', text: "HUD looks clean!", platform };
                setChatMessages(prev => [newMessage, ...prev].slice(0, 10));
                lucide.createIcons();
            };

            return (
                <div className="fixed inset-0 w-full h-full pointer-events-none p-10">
                    {/* GOAL MET ANIMATION LAYER */}
                    {showGoalMet && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center animate-goal-met pointer-events-none">
                            <div className="text-4xl font-black text-white italic tracking-tighter bg-black/50 p-4">TARGET_ACQUIRED // GOAL_MET</div>
                        </div>
                    )}

                    {/* TOP LEFT: MULTI-GOALS */}
                    <div className="flex flex-col pointer-events-auto">
                        <div className="text-[8px] text-system-purple font-bold tracking-[0.3em] mb-2 ml-1 opacity-50 uppercase">Network_Targets</div>
                        <GoalTracker label="YouTube" current={ytSubs} goal={2500} color="#FF0000" icon="youtube" />
                        <GoalTracker label="TikTok" current={ttFollows} goal={500} color="#00f2ea" icon="music" />
                        <GoalTracker label="Twitch" current={twFollows} goal={200} color="#9146FF" icon="twitch" />
                        <div className="mt-2 bg-black/70 border border-white/10 p-2 w-28 text-white text-[10px] font-bold">
                             LIVE_FEED: {viewerCount.toLocaleString()}
                        </div>
                    </div>

                    <div className="absolute top-12 right-12 flex flex-col items-end">
                        {currentAlert && <AlertBox alert={currentAlert} />}
                    </div>

                    <div className="absolute bottom-24 left-12 pointer-events-auto">
                        <ChatWidget messages={chatMessages} />
                    </div>

                    {/* DECOR */}
                    <div className="absolute bottom-8 left-8 flex items-center gap-4 opacity-40 skew-x-[-10deg] text-white">
                        <div className="w-1 h-12 bg-system-purple" />
                        <div>
                            <div className="text-[10px] font-bold uppercase tracking-widest">Pax2K_STREAM_OS</div>
                            <div className="text-xs uppercase opacity-70">Status: Operational</div>
                        </div>
                    </div>

                    {/* DEBUG PANEL */}
                    <div className="absolute bottom-8 right-8 pointer-events-auto flex flex-col gap-2 p-2 bg-black/80 opacity-20 hover:opacity-100">
                        <button onClick={() => addTestMessage('twitch')} className="text-[8px] text-white border border-white/20 p-1">TEST_TWITCH</button>
                        <button onClick={() => addTestMessage('youtube')} className="text-[8px] text-white border border-white/20 p-1">TEST_YT</button>
                        <button onClick={() => setYtSubs(2500)} className="text-[8px] text-system-purple border border-system-purple p-1">TEST_GOAL</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
