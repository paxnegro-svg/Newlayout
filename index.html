<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax2K // Omni-HUD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background-color: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }
        
        .text-twitch { color: #9146FF; }
        .text-youtube { color: #FF0000; }
        .text-tiktok { color: #00f2ea; }
        .bg-system-purple { background-color: #6B21A8; }

        /* RESPONSIVE CSS */
        .hud-wrapper { display: flex; height: 100vh; width: 100vw; padding: 2rem; transition: all 0.5s ease; }

        /* VERTICAL LAYOUT (9:16) */
        @media (max-aspect-ratio: 1/1) {
            .hud-wrapper { flex-direction: column; align-items: center; justify-content: space-between; text-align: center; }
            .goal-stack { align-items: center; width: 100%; }
            .chat-container { width: 90%; margin-bottom: 4rem; }
        }

        /* HORIZONTAL LAYOUT (16:9) */
        @media (min-aspect-ratio: 1/1) {
            .hud-wrapper { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .goal-stack { align-items: flex-start; }
            .chat-container { position: absolute; bottom: 4rem; left: 2rem; width: 350px; }
        }

        @keyframes pulse-purple {
            0% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(168, 85, 247, 0); }
            100% { box-shadow: 0 0 0 0 rgba(168, 85, 247, 0); }
        }
        .goal-met-active { animation: pulse-purple 1.5s infinite; background: #6B21A8 !important; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GoalTracker = ({ current, goal, label, color, icon, isMet }) => {
            const percentage = Math.min((current / goal) * 100, 100);
            return (
                <div className={`w-72 mb-3 p-3 bg-black/80 border-l-4 transition-all duration-500 ${isMet ? 'goal-met-active' : ''}`} 
                     style={{ borderColor: color, clipPath: 'polygon(0% 0%, 100% 0%, 95% 100%, 0% 100%)' }}>
                    <div className="flex justify-between items-center mb-1">
                        <div className="flex items-center gap-2">
                            <i data-lucide={icon} className="w-4 h-4" style={{ color: isMet ? 'white' : color }}></i>
                            <span className="text-[10px] font-bold tracking-widest uppercase">{label}</span>
                        </div>
                        <div className="text-xs font-mono font-bold">{current}/{goal}</div>
                    </div>
                    <div className="h-1 bg-white/10 overflow-hidden">
                        <div className="h-full transition-all duration-1000" style={{ width: `${percentage}%`, backgroundColor: isMet ? 'white' : color }} />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [stats, setStats] = useState({ yt: 1840, tt: 412, tw: 150 });
            const [chat, setChat] = useState([]);
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                const handleStreamEvents = (obj) => {
                    const { listener, event } = obj.detail;
                    
                    // Handle Multi-Chat
                    if (listener === 'message') {
                        const platform = event.service || 'twitch';
                        const newMessage = {
                            id: Math.random(),
                            user: event.data.displayName || event.data.nick,
                            text: event.data.text,
                            platform: platform === 'google_spreadsheet' ? 'youtube' : platform // StreamElements naming quirk
                        };
                        setChat(prev => [newMessage, ...prev].slice(0, 8));
                        setTimeout(() => lucide.createIcons(), 10);
                    }

                    // Auto-update Twitch Goal via StreamElements
                    if (listener === 'follower-latest' || listener === 'subscriber-latest') {
                        setStats(prev => ({ ...prev, tw: prev.tw + 1 }));
                    }
                };

                window.addEventListener('onEventReceived', handleStreamEvents);
                return () => window.removeEventListener('onEventReceived', handleStreamEvents);
            }, []);

            return (
                <div className="hud-wrapper pointer-events-none">
                    {/* GOAL STACK */}
                    <div className="goal-stack flex flex-col pointer-events-auto">
                        <div className="text-[9px] font-bold tracking-[0.4em] mb-4 opacity-40 uppercase text-white">Pax2K_Network_Status</div>
                        <GoalTracker label="YouTube" current={stats.yt} goal={2500} color="#FF0000" icon="youtube" isMet={stats.yt >= 2500} />
                        <GoalTracker label="TikTok" current={stats.tt} goal={500} color="#00f2ea" icon="music" isMet={stats.tt >= 500} />
                        <GoalTracker label="Twitch" current={stats.tw} goal={200} color="#9146FF" icon="twitch" isMet={stats.tw >= 200} />
                    </div>

                    {/* MULTI-PLATFORM CHAT */}
                    <div className="chat-container flex flex-col-reverse gap-2 pointer-events-auto">
                        {chat.map(msg => (
                            <div key={msg.id} className="flex flex-col p-2 bg-black/60 border-l-2 border-white/20 backdrop-blur-md transition-all">
                                <div className="flex items-center gap-2 mb-1">
                                    <i data-lucide={msg.platform === 'youtube' ? 'youtube' : msg.platform === 'tiktok' ? 'music' : 'twitch'} 
                                       className={`w-3 h-3 ${msg.platform === 'youtube' ? 'text-youtube' : msg.platform === 'tiktok' ? 'text-tiktok' : 'text-twitch'}`}></i>
                                    <span className="text-[10px] font-bold uppercase opacity-80">{msg.user}</span>
                                </div>
                                <span className="text-[11px] font-mono leading-tight opacity-90">{msg.text}</span>
                            </div>
                        ))}
                    </div>

                    {/* OVERRIDE PANEL */}
                    <div className="fixed bottom-10 right-10 pointer-events-auto">
                        {isEditing && (
                            <div className="bg-black/95 border border-white/10 p-4 mb-4 flex flex-col gap-3 w-48 shadow-2xl">
                                <div className="text-[8px] font-bold opacity-50 uppercase tracking-widest">Manual_Update</div>
                                <input type="number" value={stats.yt} onChange={e => setStats({...stats, yt: parseInt(e.target.value)})} className="bg-white/5 p-1 text-xs outline-none border border-white/10 focus:border-youtube" placeholder="YT" />
                                <input type="number" value={stats.tt} onChange={e => setStats({...stats, tt: parseInt(e.target.value)})} className="bg-white/5 p-1 text-xs outline-none border border-white/10 focus:border-tiktok" placeholder="TT" />
                                <input type="number" value={stats.tw} onChange={e => setStats({...stats, tw: parseInt(e.target.value)})} className="bg-white/5 p-1 text-xs outline-none border border-white/10 focus:border-twitch" placeholder="TW" />
                                <button onClick={() => setIsEditing(false)} className="bg-white/10 hover:bg-white/20 p-2 text-[9px] font-bold uppercase">Save_Config</button>
                            </div>
                        )}
                        <button onClick={() => setIsEditing(!isEditing)} className="w-10 h-10 bg-black/80 border border-white/10 rounded-full flex items-center justify-center hover:border-system-purple transition-all">
                            <i data-lucide="terminal" className="text-white w-4 h-4"></i>
                        </button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
