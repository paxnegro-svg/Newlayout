<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pax2K // LIVE_AUTO_HUD</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&display=swap');
        body { background: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }
        .hud-wrapper { display: flex; height: 100vh; width: 100vw; padding: 2rem; transition: all 0.4s ease; }
        
        /* VERTICAL CLONE (9:16) */
        @media (max-aspect-ratio: 1/1) {
            .hud-wrapper { flex-direction: column; align-items: center; justify-content: space-between; }
            .goal-stack { align-items: center; scale: 1.2; margin-top: 2rem; }
            .chat-box { width: 90%; margin-bottom: 6rem; }
        }
        /* HORIZONTAL (16:9) */
        @media (min-aspect-ratio: 1/1) {
            .hud-wrapper { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .chat-box { position: absolute; bottom: 4rem; left: 2rem; width: 350px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const GoalBar = ({ label, current, goal, color, icon }) => {
            const pct = Math.min((current / goal) * 100, 100);
            return (
                <div className="w-72 mb-4 p-3 bg-black/80 border-l-4 border-white/10" style={{borderColor: color}}>
                    <div className="flex justify-between text-[10px] font-bold mb-1 uppercase tracking-tighter">
                        <div className="flex items-center gap-2"><i data-lucide={icon} className="w-3 h-3" style={{color}}></i>{label}</div>
                        <div>{current} / {goal}</div>
                    </div>
                    <div className="h-1.5 bg-white/5 overflow-hidden">
                        <div className="h-full transition-all duration-1000" style={{width: `${pct}%`, backgroundColor: color, boxShadow: `0 0 10px ${color}`}} />
                    </div>
                </div>
            );
        };

        const App = () => {
            // SET YOUR "START OF STREAM" COUNTS HERE
            const [counts, setCounts] = useState({ yt: 1840, tt: 412, tw: 150 });
            const [chat, setChat] = useState([]);

            useEffect(() => {
                const onEvent = (obj) => {
                    const { listener, event } = obj.detail;

                    // 1. AUTO-READ LIVE EVENTS (SUBS/FOLLOWS)
                    if (listener === 'subscriber-latest' || listener === 'member-latest') {
                        if (event.service === 'youtube') setCounts(p => ({...p, yt: p.yt + 1}));
                        if (event.service === 'twitch') setCounts(p => ({...p, tw: p.tw + 1}));
                    }
                    if (listener === 'follower-latest') {
                        if (event.service === 'twitch') setCounts(p => ({...p, tw: p.tw + 1}));
                        if (event.service === 'tiktok') setCounts(p => ({...p, tt: p.tt + 1}));
                    }

                    // 2. CHAT FEED
                    if (listener === 'message') {
                        const platform = event.service === 'google_spreadsheet' ? 'youtube' : event.service;
                        setChat(prev => [{
                            id: Math.random(),
                            user: event.data.displayName,
                            text: event.data.text,
                            platform: platform
                        }, ...prev].slice(0, 6));
                    }
                    setTimeout(() => lucide.createIcons(), 50);
                };

                window.addEventListener('onEventReceived', onEvent);
                return () => window.removeEventListener('onEventReceived', onEvent);
            }, []);

            return (
                <div className="hud-wrapper pointer-events-none">
                    <div className="goal-stack flex flex-col pointer-events-auto">
                        <div className="text-[8px] opacity-40 font-bold tracking-[.4em] mb-4 text-white uppercase">Pax2K_Live_Telemetry</div>
                        <GoalBar label="YouTube" current={counts.yt} goal={2500} color="#FF0000" icon="youtube" />
                        <GoalBar label="TikTok" current={stats.tt} goal={500} color="#00f2ea" icon="music" />
                        <GoalBar label="Twitch" current={stats.tw} goal={200} color="#9146FF" icon="twitch" />
                    </div>

                    <div className="chat-box flex flex-col-reverse gap-2 pointer-events-auto">
                        {chat.map(m => (
                            <div key={m.id} className="p-2 bg-black/60 border-l-2 border-white/20 backdrop-blur-md">
                                <div className="flex items-center gap-2 text-[10px] font-bold">
                                    <i data-lucide={m.platform === 'youtube' ? 'youtube' : m.platform === 'tiktok' ? 'music' : 'twitch'} 
                                       className={`w-3 h-3 ${m.platform === 'youtube' ? 'text-youtube' : m.platform === 'tiktok' ? 'text-tiktok' : 'text-twitch'}`}></i>
                                    {m.user}
                                </div>
                                <div className="text-[12px] opacity-90">{m.text}</div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => lucide.createIcons(), 500);
    </script>
</body>
</html>
