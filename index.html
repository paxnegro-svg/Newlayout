<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax2K // OMNI-SYSTEM-V2.9</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        :root { --pax-purple: #A855F7; --pax-dark: #0a0a0c; }
        body { background: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }

        .scene-bg { background: var(--pax-dark); height: 100vh; width: 100vw; position: relative; display: flex; align-items: center; justify-content: center; }
        .scanline { width: 100%; height: 2px; background: rgba(168, 85, 247, 0.1); position: absolute; top: 0; animation: scan 8s linear infinite; z-index: 5; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        
        .glitch { text-shadow: 2px 0 #FF0000, -2px 0 #00f2ea; }
        .glitch-text { animation: text-glitch 2s infinite; }
        @keyframes text-glitch { 0%, 100% { text-shadow: 1px 0 #ff0000; } 50% { text-shadow: -1px 0 #00f2ea; } }
        
        @keyframes loading-slide { 0% { left: -100%; width: 30%; } 50% { left: 30%; width: 60%; } 100% { left: 100%; width: 30%; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GoalBar = ({ label, current, goal, color, icon }) => {
            const pct = Math.min((current / goal) * 100, 100).toFixed(1);
            const isMet = current >= goal;
            return (
                <div className="flex items-center gap-3 min-w-[160px]">
                    <div className="flex items-center gap-1.5 min-w-[40px]">
                        <i data-lucide={icon} className="w-3 h-3" style={{color: isMet ? '#fff' : color}}></i>
                        <span className="text-[9px] font-black opacity-60 uppercase">{label}</span>
                    </div>
                    <div className="flex-1 flex flex-col gap-0.5">
                        <div className="h-1 w-20 bg-white/5 overflow-hidden relative border border-white/5">
                            <div className="h-full transition-all duration-1000 ease-out" style={{width: `${pct}%`, backgroundColor: isMet ? '#fff' : color}} />
                        </div>
                        <div className="flex justify-between w-20 text-[7px] font-bold opacity-40">
                            <span>{pct}%</span>
                            <span>{current}/{goal}</span>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => {
            const [scene, setScene] = useState('hud');
            const [counts, setCounts] = useState({ yt: 1840, tt: 412, tw: 150 });
            const [goals] = useState({ yt: 2500, tt: 500, tw: 200 });
            const [chat, setChat] = useState([]);
            const [latestAlert, setLatestAlert] = useState(null);
            const [isEditing, setIsEditing] = useState(false);
            const [logoError, setLogoError] = useState(false);

            const RAW_LOGO_URL = "https://raw.githubusercontent.com/paxnegro-svg/Newlayout/main/pax2k-logo.png";

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const sceneParam = params.get('scene');
                if (sceneParam) setScene(sceneParam);

                const onEvent = (obj) => {
                    const { listener, event } = obj.detail;
                    if (listener === 'message') {
                        setChat(prev => [{ id: Math.random(), user: event.data.displayName, text: event.data.text, platform: event.service }, ...prev].slice(0, 5));
                    }
                    if (listener === 'subscriber-latest' || listener === 'follower-latest') {
                        setLatestAlert({ type: listener.toUpperCase(), user: event.data.name });
                        setTimeout(() => setLatestAlert(null), 5000);
                    }
                    setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 50);
                };
                window.addEventListener('onEventReceived', onEvent);
                return () => window.removeEventListener('onEventReceived', onEvent);
            }, []);

            if (scene !== 'hud') {
                const config = {
                    start: { label: 'Online', sub: 'Initializing Stream // Starting Soon', color: '#A855F7' },
                    brb: { label: 'Paused', sub: 'System Interruption // BRB', color: '#00f2ea' },
                    end: { label: 'Offline', sub: 'Connection Severed // GG', color: '#FF0000' }
                }[scene] || { label: 'Active', sub: 'System Live', color: '#A855F7' };

                return (
                    <div className="scene-bg">
                        <div className="scanline" />
                        <div className="z-10 flex flex-col items-center text-center">
                            {!logoError ? (
                                <img 
                                    src={RAW_LOGO_URL} 
                                    className="w-48 h-48 object-contain mb-8 animate-pulse" 
                                    onError={() => setLogoError(true)} 
                                />
                            ) : (
                                <div className="mb-12 text-6xl font-black glitch-text">PAX2K</div>
                            )}

                            <div className="px-4 py-1 border border-white/20 bg-white/5 text-[12px] tracking-[0.5em] uppercase mb-4 font-black" style={{color: config.color}}>
                                {config.label}
                            </div>
                            
                            <h1 className="text-8xl font-black italic glitch mb-4">PAX2K</h1>

                            <div className="h-1 w-64 bg-white/10 mb-6 overflow-hidden relative border border-white/5">
                                <div className="h-full absolute" style={{ width: '40%', backgroundColor: config.color, animation: 'loading-slide 2s infinite ease-in-out' }} />
                            </div>

                            <p className="text-sm font-bold tracking-[0.3em] opacity-40 uppercase italic">{config.sub}</p>
                        </div>
                    </div>
                );
            }

            return (
                <div className="relative h-screen w-screen overflow-hidden bg-transparent">
                    {latestAlert && (
                        <div className="fixed top-10 right-10 bg-black/90 border-t-2 border-white p-4 animate-bounce">
                            <div className="text-[10px] text-purple-400 font-bold italic">SYSTEM_ALERT</div>
                            <div className="text-2xl font-black italic">{latestAlert.user}</div>
                        </div>
                    )}

                    <div className="fixed bottom-16 left-8 flex flex-col-reverse gap-2 w-[300px] pointer-events-none">
                        {chat.map(m => (
                            <div key={m.id} className="p-2 bg-black/80 border-l-2 border-purple-500 backdrop-blur-md">
                                <div className="text-[9px] font-black uppercase flex items-center gap-2">
                                    <i data-lucide="message-square" className="w-3 h-3 text-purple-400" /> {m.user}
                                </div>
                                <div className="text-[11px] font-bold opacity-90">{m.text}</div>
                            </div>
                        ))}
                    </div>

                    <div className="fixed bottom-0 left-0 w-full h-12 bg-black/95 border-t border-purple-500/30 flex items-center justify-between px-8 z-50 pointer-events-auto">
                        <div className="text-[10px] font-black italic glitch-text tracking-widest">PAX2K // SYSTEM_ACTIVE</div>
                        <div className="flex gap-10">
                            <GoalBar label="YT" current={counts.yt} goal={goals.yt} color="#FF0000" icon="youtube" />
                            <GoalBar label="TT" current={counts.tt} goal={goals.tt} color="#00f2ea" icon="music" />
                            <GoalBar label="TW" current={counts.tw} goal={goals.tw} color="#9146FF" icon="twitch" />
                        </div>
                        <button onClick={() => setIsEditing(!isEditing)} className="opacity-40 hover:opacity-100">
                            <i data-lucide="terminal" className="w-4 h-4" />
                        </button>
                    </div>

                    {isEditing && (
                        <div className="fixed bottom-16 right-8 bg-black border border-purple-500 p-4 w-48 pointer-events-auto">
                            <input type="number" value={counts.yt} onChange={e => setCounts({...counts, yt: e.target.value})} className="bg-white/10 w-full p-1 mb-2 text-xs text-white" />
                            <button onClick={() => setIsEditing(false)} className="w-full bg-purple-600 text-[10px] font-bold p-1">CLOSE</button>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
        setTimeout(() => { if(window.lucide) lucide.createIcons(); }, 1000);
    </script>
</body>
</html>
