<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Pax2K // STREAM_SCENES</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;800&display=swap');
        body { background: #0a0a0c; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }
        
        .glitch-text { text-shadow: 2px 0 #FF0000, -2px 0 #00f2ea; animation: glitch 3s infinite; }
        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }

        .scanline {
            width: 100%; height: 2px; background: rgba(168, 85, 247, 0.2);
            position: absolute; animation: scan 4s linear infinite;
        }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }

        /* Responsive scaling */
        @media (max-aspect-ratio: 1/1) { .content-box { scale: 0.8; } }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        const SceneWrapper = ({ title, subtitle, statusColor }) => (
            <div className="relative w-screen h-screen flex flex-col items-center justify-center p-10 overflow-hidden">
                <div className="scanline" />
                
                {/* Background Decor */}
                <div className="absolute top-10 left-10 opacity-20 text-[10px] tracking-[0.5em]">SYSTEM_VERSION_1.0.8 // PAX2K</div>
                <div className="absolute bottom-10 right-10 opacity-20 text-[10px] tracking-[0.5em]">HOUSTON_TX // SECTOR_713</div>

                {/* Main Content */}
                <div className="content-box flex flex-col items-center z-10">
                    <div className="mb-4 px-4 py-1 border border-white/10 bg-white/5 text-[12px] tracking-[0.3em] uppercase opacity-70">
                        Signal_Status: <span style={{color: statusColor}}>{title}</span>
                    </div>
                    
                    <h1 className="text-6xl md:text-8xl font-black italic tracking-tighter glitch-text mb-2 uppercase">
                        Pax2K
                    </h1>
                    
                    <div className="h-1 w-64 bg-white/10 mb-6 relative overflow-hidden">
                        <div className="h-full bg-system-purple animate-[pulse_2s_infinite]" style={{width: '60%', boxShadow: '0 0 15px #A855F7'}} />
                    </div>

                    <p className="text-lg md:text-xl font-bold tracking-[0.2em] opacity-80 uppercase italic">
                        {subtitle}
                    </p>
                </div>

                {/* Platform Footer */}
                <div className="absolute bottom-20 flex gap-8 opacity-40">
                    <div className="flex items-center gap-2"><i data-lucide="youtube" className="w-4 h-4"></i><span className="text-xs">PAXTON2000</span></div>
                    <div className="flex items-center gap-2"><i data-lucide="twitch" className="w-4 h-4"></i><span className="text-xs">PAXTON2000</span></div>
                    <div className="flex items-center gap-2"><i data-lucide="music" className="w-4 h-4"></i><span className="text-xs">PAX2K</span></div>
                </div>
            </div>
        );

        const App = () => {
            const [scene, setScene] = useState('start');

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                const currentScene = params.get('scene') || 'start';
                setScene(currentScene);
                setTimeout(() => lucide.createIcons(), 100);
            }, []);

            const renderScene = () => {
                switch(scene) {
                    case 'brb':
                        return <SceneWrapper title="Paused" subtitle="System Interruption // BRB" statusColor="#00f2ea" />;
                    case 'end':
                        return <SceneWrapper title="Offline" subtitle="Connection Severed // GG" statusColor="#FF0000" />;
                    default:
                        return <SceneWrapper title="Online" subtitle="Initializing Stream // Starting Soon" statusColor="#A855F7" />;
                }
            };

            return renderScene();
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
