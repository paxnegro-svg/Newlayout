<!DOCTYPE html>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');

        body { background: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }

        .scene-bg { background: var(--pax-dark); height: 100vh; width: 100vw; position: relative; display: flex; align-items: center; justify-content: center; }
        .scanline { width: 100%; height: 2px; background: rgba(168, 85, 247, 0.1); position: absolute; top: 0; animation: scan 8s linear infinite; z-index: 5; }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        
        .glitch { text-shadow: 2px 0 #FF0000, -2px 0 #00f2ea; }
        .glitch-text { animation: text-glitch 2s infinite; }
        @keyframes text-glitch { 0%, 100% { text-shadow: 1px 0 #ff0000; } 50% { text-shadow: -1px 0 #00f2ea; } }

        .milestone-alert { position: fixed; inset: 0; z-index: 999; background: rgba(0, 0, 0, 0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.5s ease-in-out; }
        .milestone-active { opacity: 1; pointer-events: auto; }
        
        @keyframes loading-slide { 0% { left: -100%; width: 30%; } 50% { left: 30%; width: 60%; } 100% { left: 100%; width: 30%; } }
    </style>
</head>
