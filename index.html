<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pax2K // OMNI-SYSTEM-V2</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700;800&display=swap');
        :root { --pax-purple: #A855F7; --pax-dark: #0a0a0c; }
        body { background: transparent; margin: 0; overflow: hidden; font-family: 'JetBrains Mono', monospace; color: white; }

        /* Scenery Background (Dark/Eye-Friendly) */
        .scene-bg { background: var(--pax-dark); height: 100vh; width: 100vw; position: relative; }
        .scanline {
            width: 100%; height: 2px; background: rgba(168, 85, 247, 0.1);
            position: absolute; top: 0; animation: scan 8s linear infinite; z-index: 5;
        }
        @keyframes scan { from { top: 0%; } to { top: 100%; } }
        @keyframes loading-slide {
            0% { left: -100%; width: 30%; }
            50% { left: 30%; width: 60%; }
            100% { left: 100%; width: 30%; }
        }

        /* Glitch & Glow Effects */
        .glitch { text-shadow: 2px 0 #FF0000, -2px 0 #00f2ea; }
        .goal-glow { box-shadow: 0 0 15px var(--pax-purple); }

        /* Responsive Layout Logic */
        .hud-container { display: flex; height: 100vh; width: 100vw; padding: 2.5rem; transition: all 0.5s ease; }
        @media (max-aspect-ratio: 1/1) { /* Vertical Clone */
            .hud-container { flex-direction: column; align-items: center; justify-content: space-between; }
            .goal-stack { align-items: center; }
            .chat-stack { width: 90%; margin-bottom: 5rem; }
        }
        @media (min-aspect-ratio: 1/1) { /* Horizontal Main */
            .hud-container { flex-direction: row; justify-content: space-between; align-items: flex-start; }
            .chat-stack { position: absolute; bottom: 5rem; left: 2.5rem; width: 350px; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GoalBar = ({ label, current, goal, color, icon }) => {
            const pct = Math.min((current / goal) * 100, 100);
            const isMet = current >= goal;
            return (
                <div className={`w-72 mb-3 p-3 bg-black/80 border-l-4 border-white/5 transition-all ${isMet ? 'goal-glow border-purple-500' : ''}`} style={{borderColor: isMet ? '#A855F7' : color}}>
                    <div className="flex justify-between text-[10px] font-bold mb-1 tracking-tighter uppercase">
                        <div className="flex items-center gap-2">
                            <i data-lucide={icon} className="w-3 h-3" style={{color: isMet ? '#fff' : color}}></i>
                            {label}
                        </div>
                        <div>{current} / {goal}</div>
                    </div>
                    <div className="h-1 bg-white/10 overflow-hidden">
                        <div className="h-full transition-all duration-1000" style={{width: `${pct}%`, backgroundColor: isMet ? '#fff' : color}} />
                    </div>
                </div>
            );
        };

        const App = () => {
            const [scene, setScene] = useState('hud');
            const [counts, setCounts] = useState({ yt: 1840, tt: 412, tw: 150 });
            const [chat, setChat] = useState([]);
            const [isEditing, setIsEditing] = useState(false);

            useEffect(() => {
                const params = new URLSearchParams(window.location.search);
                setScene(params.get('scene') || 'hud');

                const onEvent = (obj) => {
                    const { listener, event } = obj.detail;
                    if (listener === 'message') {
                        const plat = event.service === 'google_spreadsheet' ? 'youtube' : event.service;
                        setChat(prev => [{ id: Math.random(), user: event.data.displayName, text: event.data.text, platform: plat }, ...prev].slice(0, 6));
                    }
                    if (listener === 'subscriber-latest' && event.service === 'youtube') setCounts(p => ({...p, yt: p.yt + 1}));
                    if (listener === 'follower-latest') setCounts(p => ({...p, tw: p.tw + 1}));
                    setTimeout(() => lucide.createIcons(), 50);
                };
                window.addEventListener('onEventReceived', onEvent);
                return () => window.removeEventListener('onEventReceived', onEvent);
            }, []);

            // --- RENDER START/BRB/END SCENES ---
            if (scene !== 'hud') {
                const config = {
                    start: { label: 'Online', sub: 'Initializing Stream // Starting Soon', color: '#A855F7' },
                    brb: { label: 'Paused', sub: 'System Interruption // BRB', color: '#00f2ea' },
                    end: { label: 'Offline', sub: 'Connection Severed // GG', color: '#FF0000' }
                }[scene] || { label: 'Active', sub: 'System Live', color: '#A855F7' };

                return (
                    <div className="scene-bg flex flex-col items-center justify-center">
                        <div className="scanline" />
                        <div className="absolute inset-0 opacity-[0.03]" style={{ backgroundImage: 'radial-gradient(circle, white 1px, transparent 1px)', backgroundSize: '40px 40px' }} />
                        
                        <div className="z-10 flex flex-col items-center text-center">
                            <img 
                                src="pax2k-logo.png" 
                                alt="Pax2K Logo" 
                                className="w-48 h-48 md:w-64 md:h-64 object-contain mb-6 animate-pulse drop-shadow-[0_0_15px_rgba(168,85,247,0.4)]"
                                onError={(e) => { e.target.style.display = 'none'; }}
                            />
                            <div className="px-3 py-1 border border-white/10 bg-white/5 text-[10px] tracking-[0.4em] uppercase mb-4" style={{color: config.color}}>{config.label}</div>
                            <h1 className="text-7xl md:text-9xl font-black italic tracking-tighter glitch mb-2">PAX2K</h1>
                            <div className="h-1.5 w-64 bg-white/10 mb-6 overflow-hidden relative">
                                <div className="h-full bg-purple-500 absolute left-0" style={{ width: '40%', animation: 'loading-slide 2s infinite ease-in-out' }} />
                            </div>
                            <p className="text-sm md:text-lg font-bold tracking-[0.2em] opacity-60 uppercase italic
